name: Build APK

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission to gradlew
      run: chmod +x gradlew

    - name: Upgrade Gradle Wrapper to 8.7
      run: |
        CURRENT=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | grep -oP '\d+\.\d+(\.\d+)?(?=-)')
        echo "Gradle atual: $CURRENT"
        ./gradlew wrapper --gradle-version=8.7 --distribution-type=bin
        ./gradlew wrapper --gradle-version=8.7 --distribution-type=bin  # 2x para garantir que o wrapper se auto-atualiza

    - name: Upgrade AGP in build.gradle (if needed)
      run: |
        # Atualiza o Android Gradle Plugin para versão compatível com Gradle 8.7
        sed -i "s/com\.android\.tools\.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.4.0/g" build.gradle 2>/dev/null || true
        sed -i "s/com\.android\.tools\.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.4.0/g" build.gradle.kts 2>/dev/null || true
        # Se usar version catalog (libs.versions.toml)
        sed -i "s/agp\s*=\s*\"[0-9.]*\"/agp = \"8.4.0\"/g" gradle/libs.versions.toml 2>/dev/null || true

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn

    - name: Upload Build Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: app/build/reports/
        if-no-files-found: ignore
